<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Chitra Tutorial</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f5f5f5;
    margin:0;
    padding:0;
    text-align:center;
}

header{
    background:#1e88e5;
    color:white;
    padding:25px;
}

.container{
    padding:20px;
}

.card{
    background:white;
    max-width:500px;
    margin:20px auto;
    padding:25px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input{
    width:90%;
    padding:12px;
    margin:8px 0;
    border:1px solid #ccc;
    border-radius:5px;
}

.btn{
    background:#28a745;
    color:white;
    border:none;
    padding:12px 25px;
    border-radius:5px;
    font-size:18px;
    cursor:pointer;
}

.btn:hover{
    background:#218838;
}
</style>
</head>

<body>

<header>
    <h1>Chitra Tutorial</h1>
    <p>Find the Right Tutor Near You</p>
</header>

<div class="container">

    <div class="card">
        <h2>Tutor Registration Form</h2>

        <form action="https://formsubmit.co/YOUR_EMAIL@gmail.com" method="POST">

            <input type="text" name="Name" placeholder="Full Name" required><br>

            <input type="tel" name="Mobile" placeholder="Mobile Number" required><br>

            <input type="text" name="Class" placeholder="Class" required><br>

            <input type="text" name="Subject" placeholder="Subject" required><br>

            <input type="text" name="Area" placeholder="Area" required><br>

            <input type="text" name="Qualification" placeholder="Qualification"><br>

            <input type="text" name="Experience" placeholder="Experience"><br><br>

            <button type="submit" class="btn">Submit</button>

        </form>
    </div>

</div>

</body>
</html>
